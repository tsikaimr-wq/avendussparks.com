<!DOCTYPE html>
<html>

<body>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabaseUrl = 'https://xizuwvmepfcfodwfwqce.supabase.co';
        const supabaseKey = 'sb_publishable_gj30etPyQjlvfH062VUeSw_F83Eii85';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function test() {
            const { data, error } = await supabase
                .from('trades')
                .select('id, status, outstanding_amount, paid_amount, symbol, total_amount')
                .eq('user_id', 66)
                .order('created_at', { ascending: false });

            document.body.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            if (error) document.body.innerHTML += `<div style="color:red">${JSON.stringify(error)}</div>`;
        }
        test();
    </script>
</body>

</html>
